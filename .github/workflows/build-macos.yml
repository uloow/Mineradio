name: Build macOS App

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/XxHuberrr/Mineradio.git 2>/dev/null || true
          git fetch upstream
          git merge upstream/main --no-edit || echo "Already up to date"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --registry=https://registry.npmmirror.com

      - name: Install Electron
        run: |
          cd node_modules/electron
          node install.js

      - name: Apply Metal fix
        run: node apply-metal-fix.js

      - name: Configure build
        run: node configure-build.js

      - name: Build
        run: npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: Mineradio-macOS
          path: dist/*.dmg
