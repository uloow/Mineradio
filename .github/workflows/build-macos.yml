name: Build macOS App

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/XxHuberrr/Mineradio.git 2>/dev/null || true
          git fetch upstream
          UPSTREAM=$(git rev-parse upstream/main)
          LOCAL=$(git rev-parse HEAD)
          echo "Local: $LOCAL"
          echo "Upstream: $UPSTREAM"
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "New upstream commits found, merging..."
            git merge upstream/main --no-edit
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --registry=https://registry.npmmirror.com

      - name: Install Electron
        run: |
          cd node_modules/electron
          node install.js

      - name: Apply Metal fix
        run: |
          sed -i.bak \
            "s/\['use-angle', 'd3d11'\]//" \
            desktop/main.js
          
          # 在末尾添加 Metal 检测代码（在 const gotSingleInstanceLock 之前）
          sed -i '/const gotSingleInstanceLock = app.requestSingleInstanceLock();/i\
          // macOS 使用 Metal，Windows 使用 D3d11\
          if (process.platform === '"'"'darwin'"'"') {\
            app.commandLine.appendSwitch('"'"'use-angle'"'"', '"'"'metal'"'"');\
          } else if (process.platform === '"'"'win32'"'"') {\
            app.commandLine.appendSwitch('"'"'use-angle'"'"', '"'"'d3d11'"'"');\
          }\
          ' desktop/main.js
          
          echo "Metal fix applied"

      - name: Configure build
        run: |
          node -e '
          const pkg = JSON.parse(require("fs").readFileSync("package.json"));
          pkg.build = pkg.build || {};
          pkg.build.mac = { category: "public.app-category.music" };
          delete pkg.devDependencies["rcedit"];
          require("fs").writeFileSync("package.json", JSON.stringify(pkg, null, 2));
          console.log("Build config updated");
          '

      - name: Build
        run: npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: Mineradio-macOS
          path: dist/*.dmg
