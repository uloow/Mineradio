name: Build macOS App

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/XxHuberrr/Mineradio.git 2>/dev/null || true
          git fetch upstream
          UPSTREAM=$(git rev-parse upstream/main)
          LOCAL=$(git rev-parse HEAD)
          echo "本地: $LOCAL"
          echo "上游: $UPSTREAM"
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "检测到上游有更新，正在合并..."
            git merge upstream/main --no-edit
          else
            echo "已是最新，无需构建"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --registry=https://registry.npmmirror.com

      - name: Install Electron
        run: |
          cd node_modules/electron
          ELECTRON_MIRROR=${{ env.ELECTRON_MIRROR }} node install.js

      - name: Apply Metal fix
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('desktop/main.js', 'utf8');
          if (!content.includes(\"process.platform === 'darwin'\")) {
            const old = \"['use-angle', 'd3d11']\";
            if (content.includes(old)) {
              const fixed = content.replace(
                /const CHROMIUM_PERFORMANCE_SWITCHES = \\[\s*\\['autoplay-policy'[^\\]]*\\],?\s*\\['use-angle', 'd3d11'\\],\s*\\];/,
                \`const CHROMIUM_PERFORMANCE_SWITCHES = [
  ['autoplay-policy', 'no-user-gesture-required'],
  ['ignore-gpu-blocklist'],
  ['enable-gpu-rasterization'],
  ['enable-oop-rasterization'],
  ['enable-zero-copy'],
  ['enable-accelerated-2d-canvas'],
  ['disable-background-timer-throttling'],
  ['disable-renderer-backgrounding'],
  ['disable-backgrounding-occluded-windows'],
  ['force_high_performance_gpu'],
];

if (process.platform === 'darwin') {
  app.commandLine.appendSwitch('use-angle', 'metal');
} else if (process.platform === 'win32') {
  app.commandLine.appendSwitch('use-angle', 'd3d11');
}\`
              );
              fs.writeFileSync('desktop/main.js', fixed);
              console.log('Metal 修复已应用');
            }
          }
          "

      - name: Configure build
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json'));
          pkg.build = pkg.build || {};
          pkg.build.mac = { category: 'public.app-category.music', target: ['dmg'] };
          delete pkg.devDependencies['rcedit'];
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build
        run: npx electron-builder --mac
        env:
          ELECTRON_MIRROR: ${{ env.ELECTRON_MIRROR }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-macOS
          path: dist/*.dmg
          retention-days: 7
