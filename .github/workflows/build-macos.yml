name: Build macOS App

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/XxHuberrr/Mineradio.git 2>/dev/null || true
          git fetch upstream
          UPSTREAM=$(git rev-parse upstream/main)
          LOCAL=$(git rev-parse HEAD)
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "检测到上游有更新，正在合并..."
            git merge upstream/main --no-edit
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --registry=https://registry.npmmirror.com

      - name: Install Electron
        run: |
          cd node_modules/electron
          node install.js

      - name: Apply Metal fix
        run: node apply-metal-fix.js

      - name: Configure build
        run: node configure-build.js

      - name: Build DMG
        run: |
          # 禁用自动发布
          npx electron-builder --mac dmg --publish never

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-latest
          release_name: Mineradio macOS 构建
          body: |
            ## Mineradio macOS 构建

            自动构建，上游同步版本
          draft: false
          prerelease: false
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
