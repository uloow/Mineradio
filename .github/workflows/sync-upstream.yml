name: Sync Upstream

on:
  schedule:
    # 每小时检查一次上游
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/XxHuberrr/Mineradio.git 2>/dev/null || true
          git fetch upstream
          
          UPSTREAM=$(git rev-parse upstream/main)
          LOCAL=$(git rev-parse HEAD)
          
          echo "你的仓库: $LOCAL"
          echo "上游仓库: $UPSTREAM"
          
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "检测到上游有更新，正在同步..."
            git merge upstream/main --no-edit
            git push origin main
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "已是最新，无需同步"
            echo "synced=false" >> $GITHUB_OUTPUT
          fi
        id: sync

      # 如果有同步，触发构建
      - name: Trigger build
        if: steps.sync.outputs.synced == 'true'
        run: |
          echo "上游有更新，已推送到 main 分支"
          echo "构建 workflow 会自动触发"
